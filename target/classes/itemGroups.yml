# ============================ 物品组配置 ============================
# 每个物品组包含若干物品, 通过 "权重" 决定钓上各物品的概率
# 鱼竿会把其 item-groups 所列各组中的全部物品汇总成一个权重池抽奖
#
# 单个物品字段:
#   source    : 物品库类型, mm 或 ni
#   item-id   : 物品库中的节点名/内部名 (钓上后从对应物品库提取该物品给玩家)
#   weight    : 权重 (数字越大越容易钓到)
#   money     : 钓上后给予的金币数量 (Vault), 留空则不给
#   points    : 钓上后给予的点券数量 (PlayerPoints), 留空则不给
#   exp       : 钓上后给予的经验数量, 留空则不给
#   variables : 钓上后增加的自定义变量 (变量名 -> 基础值), 对应 config.yml 的 custom-variables
#               最终增加量 = 基础值 * 鱼竿 variable-multipliers 中对应变量的倍率
#               例: variables: {ll_level: 5} 表示钓到此鱼增加 5 点 ll_level 变量 (再乘鱼竿倍率)
#   commands  : 钓上后触发的指令, 留空则不触发
#               指令前缀 (大小写不敏感):
#                 [OP]        以 OP 玩家身份执行后续指令
#                 [CONSOLE]   以控制台身份执行后续指令
#                 [BroadCast] 向全服公告后续文本 (按 & 颜色码上色, 非指令)
#                 [tell]      仅向钓上鱼的玩家发送后续文本 (按 & 颜色码上色, 非指令)
#                 (无前缀)    默认以控制台执行
#               所有前缀均支持 %player_name% 占位符
# 注: 金币/点券/经验最终数量 = 物品配置数量 * 鱼竿对应倍率

item-groups:
  common_fish:
    items:
      cod:
        source: mm
        item-id: "raw_cod"
        weight: 50
        money: 10
        points: 1
        exp: 5
        commands: []
      salmon:
        source: ni
        item-id: "raw_salmon"
        weight: 30
        money: 15
        exp: 8
        commands:
          - "[OP] me 钓到了一条鲑鱼"
      junk_boot:
        source: mm
        item-id: "leather_boots"
        weight: 20
        commands: []

  rare_fish:
    items:
      rare_tuna:
        source: ni
        item-id: "rare_tuna"
        weight: 40
        money: 80
        points: 8
        exp: 30
        # 钓到此鱼增加 5 点 ll_level 变量 (最终 = 5 * 鱼竿倍率)
        variables:
          ll_level: 5
        commands:
          # [BroadCast] 向全服公告稀有鱼上钩
          - "[BroadCast] &6&l稀有金枪鱼上钩! &e钓手: &f%player_name%"
          # [tell] 仅发给钓上鱼的玩家
          - "[tell] &a你钓到了一条稀有的金枪鱼!"
          - "[CONSOLE] say 稀有金枪鱼上钩! 钓手: %player_name%"
      treasure_chest:
        source: mm
        item-id: "treasure_chest"
        weight: 10
        money: 200
        points: 20
        exp: 100
        commands:
          # [BroadCast] 全服公告宝藏上钩
          - "[BroadCast] &d&l宝藏箱上钩! &6钓手: &f%player_name% &6获得了巨额奖励!"
          # [tell] 私发提示
          - "[tell] &d你钓到了一个宝藏箱! 里面似乎装满了宝物..."
          - "[CONSOLE] give %player_name% diamond 1"
