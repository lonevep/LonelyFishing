# ============================ LonelyFishing 通用配置 ============================

# 是否阻止玩家使用 "未在 rods.yml 中配置" 的鱼竿(含原版鱼竿)钓鱼
# true  : 只有 rods.yml 中配置的鱼竿才能钓鱼, 其余鱼竿抛竿时会被取消并提示
# false : 未配置的鱼竿按原版钓鱼处理, 配置过的鱼竿走本插件的奖励逻辑
block-vanilla-rods: true

# 未配置鱼竿提示的发送冷却 (秒), 防止刷屏
message-cooldown: 3

# 钓上物品后, 若背包满则是否将物品掉落在玩家脚下
drop-when-full: true
